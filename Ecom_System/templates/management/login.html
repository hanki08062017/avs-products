<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVS Management — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card {
    background: #fff; border-radius: 16px; padding: 2.5rem 2rem;
    width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,.08);
  }
  .brand-icon { width: 52px; height: 52px; background: #4f46e5; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
  .brand-icon i { color: #fff; font-size: 1.5rem; }
  h4 { font-weight: 700; color: #1e293b; text-align: center; }
  .sub { color: #64748b; font-size: .85rem; text-align: center; margin-bottom: 1.8rem; }
  label { font-size: .82rem; font-weight: 500; color: #374151; }
  .form-control { border-radius: 8px; font-size: .88rem; padding: .55rem .85rem; }
  .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
  .btn-login { background: #4f46e5; color: #fff; border: none; border-radius: 8px;
    padding: .6rem; font-size: .9rem; font-weight: 600; width: 100%; }
  .btn-login:hover { background: #4338ca; color: #fff; }
  .input-group-text { border-radius: 0 8px 8px 0; background: #f8fafc; cursor: pointer; }
  .alert { font-size: .83rem; border-radius: 8px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand-icon"><i class="bi bi-grid-3x3-gap-fill"></i></div>
  <h4>AVS Management</h4>
  <p class="sub">Sign in to access the management panel</p>

  {% if error %}
  <div class="alert alert-danger py-2"><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" class="form-control mt-1" placeholder="Enter username" required autofocus>
    </div>
    <div class="mb-4">
      <label for="password">Password</label>
      <div class="input-group mt-1">
        <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
        <span class="input-group-text" onclick="togglePw()"><i class="bi bi-eye" id="eyeIcon"></i></span>
      </div>
    </div>
    <button type="submit" class="btn-login">Sign In</button>
  </form>
</div>

<script>
function togglePw() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') { inp.type = 'text'; icon.className = 'bi bi-eye-slash'; }
  else { inp.type = 'password'; icon.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
