{% extends 'customer/base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<style>
.pw-container { max-width: 450px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; margin-bottom: 0.4rem; color: #34495e; font-weight: 600; font-size: 0.9rem; }
.form-group input { width: 100%; padding: 0.7rem; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 0.95rem; box-sizing: border-box; }
.btn { background: #3498db; color: white; border: none; padding: 0.7rem 2rem; border-radius: 4px; cursor: pointer; font-size: 0.95rem; width: 100%; }
.btn:hover { background: #2980b9; }
.alert-error { background: #fadbd8; color: #c0392b; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.9rem; }
.alert-success { background: #d5f4e6; color: #1e8449; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.9rem; }
.back-link { display: inline-block; margin-bottom: 1rem; color: #3498db; font-size: 0.9rem; text-decoration: none; }
.back-link:hover { text-decoration: underline; }
</style>
<div class="pw-container">
    <a href="{% url 'profile' user.username %}" class="back-link">← Back to Profile</a>
    <h3 style="color: #2c3e50; margin-bottom: 1.5rem;">Change Password</h3>
    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
    {% if success %}<div class="alert-success">{{ success }}</div>{% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Current Password</label>
            <input type="password" name="current_password" required>
        </div>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" id="newPw" required minlength="6">
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" id="confirmPw" required minlength="6">
        </div>
        <button type="submit" class="btn">Change Password</button>
    </form>
</div>
{% endblock %}
