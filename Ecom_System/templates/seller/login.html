<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #ecf0f1; }
        .login-container { max-width: 400px; margin: 5rem auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .login-container h2 { color: #2c3e50; margin-bottom: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #34495e; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #bdc3c7; border-radius: 4px; }
        .login-btn { background: #3498db; color: white; border: none; padding: 0.75rem; width: 100%; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .login-btn:hover { background: #2980b9; }
        .error { background: #e74c3c; color: white; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Staff Login</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>Business Code</label>
                <input type="text" name="business_code" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
        <div style="text-align: center; margin-top: 1rem;">
            <p>Don't have an account? <a href="{% url 'signup' %}" style="color: #3498db;">Sign up here</a></p>
        </div>
    </div>
</body>
</html>
