{% extends 'seller/seller_base.html' %}

{% block content %}
<style>
    .form-container { max-width: 800px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .form-container h2 { color: #2c3e50; margin-bottom: 1.5rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: #34495e; font-weight: bold; }
    .form-group input, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid #bdc3c7; border-radius: 4px; }
    .btn-submit { background: #27ae60; color: white; border: none; padding: 0.75rem 2rem; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    .btn-submit:hover { background: #229954; }
    .btn-back { background: #95a5a6; color: white; padding: 0.75rem 2rem; border-radius: 4px; text-decoration: none; display: inline-block; margin-right: 1rem; }
    .info-box { background: #e8f5e9; padding: 1rem; border-radius: 4px; margin-bottom: 1rem; color: #2e7d32; }
</style>

<div class="form-container">
    <h2>Add New Staff</h2>
    {% if error %}
    <div style="background: #f8d7da; color: #721c24; padding: 1rem; border-radius: 4px; margin-bottom: 1rem;">
        {{ error }}
    </div>
    {% endif %}
    <div class="info-box">
        <strong>Business Code:</strong> {{ business_code }} | <strong>Business Type:</strong> {{ business_type }}
    </div>
    <form method="POST">
        {% csrf_token %}
        
        <h3 style="color: #2c3e50; margin-bottom: 1rem; border-bottom: 2px solid #3498db; padding-bottom: 0.5rem;">Personal Information</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Staff ID *</label>
                <input type="text" name="staff_id" value="{{ auto_staff_id }}" readonly style="background: #f0f0f0;" required>
            </div>
            <div class="form-group">
                <label>Username *</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" name="first_name" required>
            </div>
            <div class="form-group">
                <label>Middle Name</label>
                <input type="text" name="middle_name">
            </div>
            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" name="last_name" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Phone *</label>
                <input type="text" name="phone" required>
            </div>
            <div class="form-group">
                <label>Staff Role *</label>
                <input type="text" name="staff_role" value="{{ allowed_role }}" readonly style="background: #f0f0f0;" required>
            </div>
        </div>
        
        <h3 style="color: #2c3e50; margin: 1.5rem 0 1rem; border-bottom: 2px solid #3498db; padding-bottom: 0.5rem;">Address Information</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Address Line 1</label>
                <input type="text" name="address1">
            </div>
            <div class="form-group">
                <label>Address Line 2</label>
                <input type="text" name="address2">
            </div>
            <div class="form-group">
                <label>Address Line 3</label>
                <input type="text" name="address3">
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" name="city">
            </div>
            <div class="form-group">
                <label>State</label>
                <input type="text" name="state">
            </div>
            <div class="form-group">
                <label>PIN Code</label>
                <input type="text" name="pin">
            </div>
            <div class="form-group">
                <label>Country</label>
                <input type="text" name="country">
            </div>
            <div class="form-group">
                <label>Phone 2</label>
                <input type="text" name="phone2">
            </div>
        </div>
        
        <h3 style="color: #2c3e50; margin: 1.5rem 0 1rem; border-bottom: 2px solid #3498db; padding-bottom: 0.5rem;">Staff Privileges</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1.5rem;">
            <label style="font-weight: normal;"><input type="checkbox" name="manage_orders" style="width: auto; margin-right: 0.5rem;"> Manage Orders</label>
            <label style="font-weight: normal;"><input type="checkbox" name="manage_products" style="width: auto; margin-right: 0.5rem;"> Manage Products</label>
            <label style="font-weight: normal;"><input type="checkbox" name="manage_reports" style="width: auto; margin-right: 0.5rem;"> Manage Reports</label>
            <label style="font-weight: normal;"><input type="checkbox" name="manage_payments" style="width: auto; margin-right: 0.5rem;"> Manage Payments</label>
        </div>
        
        <div style="margin-top: 2rem;">
            <a href="{% url 'manage_staff' %}" class="btn-back">Back</a>
            <button type="submit" class="btn-submit">Add Staff</button>
        </div>
    </form>
</div>
{% endblock %}
