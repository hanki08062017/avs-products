{% extends 'shop/seller_base.html' %}

{% block content %}
<style>
    .form-container { max-width: 800px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .form-container h2 { color: #2c3e50; margin-bottom: 1.5rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: #34495e; font-weight: bold; }
    .form-group input, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid #bdc3c7; border-radius: 4px; }
    .btn-submit { background: #27ae60; color: white; border: none; padding: 0.75rem 2rem; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    .btn-submit:hover { background: #229954; }
    .btn-back { background: #95a5a6; color: white; padding: 0.75rem 2rem; border-radius: 4px; text-decoration: none; display: inline-block; margin-right: 1rem; }
    .info-box { background: #e8f5e9; padding: 1rem; border-radius: 4px; margin-bottom: 1rem; color: #2e7d32; }
</style>

<div class="form-container">
    <h2>Add New Staff</h2>
    <div class="info-box">
        <strong>Business Code:</strong> {{ business_code }} - Staff will be tied to this business
    </div>
    <form method="POST">
        {% csrf_token %}
        <div class="form-grid">
            <div class="form-group">
                <label>Staff ID *</label>
                <input type="text" name="staff_id" required>
            </div>
            <div class="form-group">
                <label>Username *</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" name="first_name" required>
            </div>
            <div class="form-group">
                <label>Middle Name</label>
                <input type="text" name="middle_name">
            </div>
            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" name="last_name" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Phone *</label>
                <input type="text" name="phone" required>
            </div>
            <div class="form-group">
                <label>Staff Role *</label>
                <select name="staff_role" required>
                    <option value="">Select Role</option>
                    <option value="Seller-Admin">Seller-Admin</option>
                    <option value="Seller-Staff">Seller-Staff</option>
                    <option value="Shop-Admin">Shop-Admin</option>
                    <option value="Shop-Staff">Shop-Staff</option>
                </select>
            </div>
        </div>
        <div style="margin-top: 2rem;">
            <a href="{% url 'manage_staff' %}" class="btn-back">Back</a>
            <button type="submit" class="btn-submit">Add Staff</button>
        </div>
    </form>
</div>
{% endblock %}
