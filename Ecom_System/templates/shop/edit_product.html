{% extends 'shop/seller_base.html' %}

{% block content %}
<style>
    .form-container { max-width: 800px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .form-container h2 { color: #2c3e50; margin-bottom: 1.5rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: #34495e; font-weight: bold; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.75rem; border: 1px solid #bdc3c7; border-radius: 4px; }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .btn-submit { background: #27ae60; color: white; border: none; padding: 0.75rem 2rem; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    .btn-submit:hover { background: #229954; }
    .btn-back { background: #95a5a6; color: white; padding: 0.75rem 2rem; border-radius: 4px; text-decoration: none; display: inline-block; margin-right: 1rem; }
</style>

<div class="form-container">
    <h2>Edit Product</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-grid">
            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" name="product_name" value="{{ product.product_name }}" required>
            </div>
            <div class="form-group">
                <label>Category *</label>
                <select name="category" required>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if cat.id == product.product_category.id %}selected{% endif %}>{{ cat.category }} - {{ cat.sub_category }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group full">
                <label>Description</label>
                <textarea name="description">{{ product.description }}</textarea>
            </div>
            <div class="form-group">
                <label>Quantity *</label>
                <input type="number" name="quantity" value="{{ product.quantity }}" required>
            </div>
            <div class="form-group">
                <label>Unit *</label>
                <input type="text" name="unit" value="{{ product.unit }}" required>
            </div>
            <div class="form-group">
                <label>MRP *</label>
                <input type="number" step="0.01" name="mrp" value="{{ product.mrp }}" required>
            </div>
            <div class="form-group">
                <label>Cost Price *</label>
                <input type="number" step="0.01" name="cost_price" value="{{ product.cost_price }}" required>
            </div>
            <div class="form-group">
                <label>Selling Price *</label>
                <input type="number" step="0.01" name="selling_price" value="{{ product.selling_price }}" required>
            </div>
            <div class="form-group">
                <label>Stock *</label>
                <input type="number" name="stock" value="{{ product.stock }}" required>
            </div>
            <div class="form-group">
                <label>Source</label>
                <input type="text" name="source" value="{{ product.source }}">
            </div>
            <div class="form-group">
                <label>Manufacturer</label>
                <input type="text" name="manufacturer" value="{{ product.manufacturer }}">
            </div>
            <div class="form-group">
                <label>Status *</label>
                <select name="status" required>
                    <option value="Active" {% if product.status == 'Active' %}selected{% endif %}>Active</option>
                    <option value="Inactive" {% if product.status == 'Inactive' %}selected{% endif %}>Inactive</option>
                </select>
            </div>
            <div class="form-group full">
                <label>Current Images</label>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem;">
                    {% for img in product.images.all %}
                    <img src="{{ img.image.url }}" style="width: 100px; height: 100px; object-fit: cover; border-radius: 4px;">
                    {% endfor %}
                </div>
            </div>
            <div class="form-group full">
                <label>Add More Images (Multiple)</label>
                <input type="file" name="images" multiple accept="image/*">
            </div>
        </div>
        <div style="margin-top: 2rem;">
            <a href="{% url 'seller_dashboard' %}" class="btn-back">Back</a>
            <button type="submit" class="btn-submit">Update Product</button>
        </div>
    </form>
</div>
{% endblock %}
